name: Release bakbot

on:
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: write
  packages: write

env:
  APP_NAME: bakbot

jobs:
  build:
    name: Build Go Binary
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Get version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=0.0.1" >> $GITHUB_OUTPUT
          fi

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p build

          VERSION=${{ steps.version.outputs.VERSION }}
          COMMIT=${GITHUB_SHA}
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          BIN_NAME=${{ env.APP_NAME }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BIN_NAME="${BIN_NAME}.exe"
          fi

          go build \
            -ldflags "-s -w \
              -X github.com/mehdikhody/bakbot/internal/version.Version=${VERSION} \
              -X github.com/mehdikhody/bakbot/internal/version.Commit=${COMMIT} \
              -X github.com/mehdikhody/bakbot/internal/version.Date=${DATE}" \
            -o build/${BIN_NAME} .

      - name: Prepare package
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          PKG_NAME="${{ env.APP_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}-${VERSION}"

          mkdir -p package/${PKG_NAME}

          BIN_NAME=${{ env.APP_NAME }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BIN_NAME="${BIN_NAME}.exe"
          fi

          cp build/${BIN_NAME} package/${PKG_NAME}/
          cp README.md package/${PKG_NAME}/ || true

          cd package
          zip -r ${PKG_NAME}.zip ${PKG_NAME}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: package/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}